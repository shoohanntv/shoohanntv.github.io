<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="join-screen" class="card">
  <h1>🎮 Tic Tac Toe</h1>

  <input id="room-input" placeholder="Room Code">
  <input id="name-input" placeholder="Your Name">

  <div class="btns">
    <button onclick="joinRoom()">Join Game</button>
    <button onclick="copyLink()">Copy Link</button>
  </div>
</div>

<div id="game-screen" style="display:none">

  <div class="top">
    <h2 id="player-status"></h2>
    <h3 id="turn-display"></h3>
  </div>

  <div id="board"></div>

  <div id="scoreboard">
    <span id="p1-score"></span>
    <span id="draw-score"></span>
    <span id="p2-score"></span>
  </div>

  <h2 id="round-result"></h2>

  <div id="chat">
    <div id="chat-box"></div>

    <div class="quick">
      <button onclick="sendQuick('🔥 Nice')">🔥</button>
      <button onclick="sendQuick('😂 Haha')">😂</button>
      <button onclick="sendQuick('😡 Nooo')">😡</button>
    </div>

    <input id="chat-input" placeholder="Message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Sounds -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
